name: "MeshMonitor"
description: "Web-based monitoring for Meshtastic mesh networks"
version: "0.1.0"
slug: "meshmonitor"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto

# Expose container port 3001 to host 8987
ports:
  3001/tcp: 8987

webui: "http://[HOST]:[PORT:8987]/"

options:
  meshtastic_node_ip: "192.168.1.100"
schema:
  meshtastic_node_ip: str
