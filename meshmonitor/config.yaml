name: "MeshMonitor"
description: "Web-based monitoring for Meshtastic mesh networks"
version: "0.1.0"
slug: "meshmonitor"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ports:
  3001/tcp: 8987
webui: "[PROTO:ssl]/[HOST]:[PORT:8987]/"
map:
  - share:rw
options:
  meshtastic_node_ip: "192.168.1.100"
  port: 3001
  ssl: false
schema:
  meshtastic_node_ip: str
  port: "port(1024,65535)"
  ssl: bool
